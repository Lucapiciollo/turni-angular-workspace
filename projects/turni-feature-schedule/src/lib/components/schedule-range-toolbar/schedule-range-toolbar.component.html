<mat-card class="range-toolbar">
    <div class="toolbar-line">
        <div class="period-area">
            <div class="range-nav">
                <button
                    mat-icon-button
                    type="button"
                    class="nav-button"
                    [disabled]="generating"
                    (click)="previousRange.emit()"
                    aria-label="Periodo precedente"
                >
                    <mat-icon>chevron_left</mat-icon>
                </button>

                <button
                    mat-icon-button
                    type="button"
                    class="nav-button"
                    [disabled]="generating"
                    (click)="nextRange.emit()"
                    aria-label="Periodo successivo"
                >
                    <mat-icon>chevron_right</mat-icon>
                </button>
            </div>

            <div class="range-title">
                <span class="range-icon">
                    <mat-icon>date_range</mat-icon>
                </span>

                <div class="range-heading">
                    <strong>{{ range?.label || 'Periodo' }}</strong>
                    <span>{{ generatedAtLabel }}</span>
                </div>
            </div>
        </div>

        <div class="action-area">
            <button
                mat-flat-button
                color="primary"
                type="button"
                [disabled]="isPastRange || generating"
                (click)="refreshRange.emit()"
            >
                <mat-icon>autorenew</mat-icon>
                Genera
            </button>

            <button
                mat-stroked-button
                color="warn"
                type="button"
                [disabled]="isPastRange || generating"
                (click)="refreshStrongRange.emit()"
            >
                <mat-icon>refresh</mat-icon>
                Rigenera
            </button>

            <button
                mat-stroked-button
                color="warn"
                type="button"
                *ngIf="generating"
                (click)="cancelGeneration.emit()"
            >
                <mat-icon>stop_circle</mat-icon>
                Annulla
            </button>

            <button
                mat-stroked-button
                type="button"
                [disabled]="isPastRange || generating"
                (click)="clearCurrentPeriodCache.emit()"
            >
                <mat-icon>cleaning_services</mat-icon>
                Pulisci cache
            </button>

            <button
                mat-stroked-button
                type="button"
                (click)="viewGrid.emit()"
            >
                <mat-icon>table_view</mat-icon>
                Vista tabella
            </button>

            <button
                mat-stroked-button
                type="button"
                (click)="exportPdf.emit()"
            >
                <mat-icon>picture_as_pdf</mat-icon>
                Esporta PDF
            </button>
        </div>

        <mat-button-toggle-group
            class="mode-toggle"
            [value]="mode"
            (change)="modeChange.emit($event.value)"
            aria-label="Modalità periodo"
        >
            <mat-button-toggle value="MONTH">Mese</mat-button-toggle>
            <mat-button-toggle value="WEEK">Settimana</mat-button-toggle>
        </mat-button-toggle-group>
    </div>

    <div
        class="generation-progress"
        *ngIf="generating"
    >
        <div class="progress-copy">
            <mat-icon>hourglass_top</mat-icon>
            <span>
                Generazione in corso
                <strong>{{ generationProgress }}%</strong>
                <small *ngIf="generationCurrentDate"> · {{ generationCurrentDate }}</small>
            </span>
        </div>

        <mat-progress-bar
            mode="determinate"
            [value]="generationProgress"
        ></mat-progress-bar>
    </div>

    <div
        class="past-message"
        *ngIf="isPastRange"
    >
        <mat-icon>lock_clock</mat-icon>
        Periodo passato: generazione disabilitata. Se non esiste un piano salvato, vengono mostrate liste vuote.
    </div>
</mat-card>
