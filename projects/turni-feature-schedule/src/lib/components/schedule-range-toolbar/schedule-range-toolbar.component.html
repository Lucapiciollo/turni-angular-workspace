<section class="toolbar-card">
    <div class="toolbar-left">
        <mat-button-toggle-group
            class="mode-switch"
            [value]="mode"
            aria-label="Selezione vista periodo"
        >
            <mat-button-toggle
                value="MONTH"
                (click)="modeChange.emit('MONTH')"
            >
                Mese
            </mat-button-toggle>

            <mat-button-toggle
                value="WEEK"
                (click)="modeChange.emit('WEEK')"
            >
                Settimana
            </mat-button-toggle>
        </mat-button-toggle-group>

        <div class="generation-meta">
            <mat-chip>
                Seed {{ generationSeed }}
            </mat-chip>

            <mat-chip>
                {{ source }}
            </mat-chip>

            <mat-chip
                matTooltip="Identificativo del periodo in cache"
                matTooltipPosition="above"
            >
                {{ cacheKey }}
            </mat-chip>
        </div>
    </div>

    <div class="range-navigation">
        <button
            mat-icon-button
            type="button"
            aria-label="Periodo precedente"
            (click)="previousRange.emit()"
        >
            <mat-icon>chevron_left</mat-icon>
        </button>

        <div class="range-info">
            <strong>
                {{ range?.label }}
            </strong>

            <span>
                {{ range?.startDate }} → {{ range?.endDate }}
            </span>

            <small>
                Generato: {{ generatedAtLabel }}
            </small>
        </div>

        <button
            mat-icon-button
            type="button"
            aria-label="Periodo successivo"
            (click)="nextRange.emit()"
        >
            <mat-icon>chevron_right</mat-icon>
        </button>

        <button
            mat-flat-button
            color="primary"
            type="button"
            (click)="refreshRange.emit()"
            matTooltip="Rigenera il periodo corrente sovrascrivendo la cache"
            matTooltipPosition="above"
        >
            <mat-icon>refresh</mat-icon>
            Rigenera
        </button>

        <button
            mat-stroked-button
            color="primary"
            type="button"
            (click)="refreshStrongRange.emit()"
            matTooltip="Aumenta molto il seed per ottenere una rotazione più diversa"
            matTooltipPosition="above"
        >
            <mat-icon>shuffle</mat-icon>
            Rigenera forte
        </button>

        <button
            mat-stroked-button
            color="warn"
            type="button"
            (click)="clearCacheRange.emit()"
            matTooltip="Elimina la cache del periodo e rigenera"
            matTooltipPosition="above"
        >
            <mat-icon>delete_sweep</mat-icon>
            Pulisci cache
        </button>
    </div>
</section>
