<div class="app-layout">
    <aside class="app-menu">
        <div class="brand">
            <div class="brand-logo">
                <mat-icon>event_available</mat-icon>
            </div>

            <div class="brand-text">
                <h1>Turni</h1>
                <span>Pianificazione</span>
            </div>
        </div>

        <nav class="menu-list" aria-label="Menu principale">
            <a
                class="menu-item"
                *ngFor="let item of menuItems"
                [routerLink]="item.route"
                routerLinkActive="active"
                [routerLinkActiveOptions]="{ exact: item.exact === true }"
                [matTooltip]="item.label"
                matTooltipPosition="right"
            >
                <span class="active-marker"></span>

                <span class="menu-icon">
                    <mat-icon>{{ item.icon }}</mat-icon>
                </span>

                <span class="menu-content">
                    <strong>{{ item.label }}</strong>
                    <small>{{ item.description }}</small>
                </span>
            </a>
        </nav>

        <div class="menu-footer">
            <span class="footer-dot"></span>
            <span>Locale · NgRx</span>
        </div>
    </aside>

    <section class="app-page">
        <header class="page-topbar">
            <div class="topbar-title">
                <span class="topbar-kicker">Dashboard</span>
                <h2>Gestione turni</h2>
            </div>

            <div class="topbar-actions">
                <button
                    mat-icon-button
                    type="button"
                    routerLink="/piano-turni/operatori"
                    matTooltip="Operatori"
                >
                    <mat-icon>manage_accounts</mat-icon>
                </button>

                <button
                    mat-icon-button
                    type="button"
                    routerLink="/piano-turni/regole-turni"
                    matTooltip="Regole turni"
                >
                    <mat-icon>tune</mat-icon>
                </button>

                <button
                    mat-flat-button
                    color="primary"
                    type="button"
                    routerLink="/piano-turni"
                >
                    <mat-icon>calendar_today</mat-icon>
                    Piano
                </button>
            </div>
        </header>

        <main class="page-scroll">
            <router-outlet></router-outlet>
        </main>
    </section>
</div>
